<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            padding:0;
            /* box-sizing:border-box; */
        }
        nav{
            background-color:rgb(17, 17, 39);
            height:50px;
            text-align:center;
            padding:20px 1px 1px 1px;

        }
        nav>a{
            color:white;
            background:blue;
            padding:10px;
            border-radius: 10%;
            text-decoration: none;
        }

        .s1{
            text-align:center;
            color:white;
            height:300px;
            background-size:100% 100%;
            padding:80px 1px 1px;
            background-image:  linear-gradient(
      rgba(0,0,0,0.6),
      rgba(0,0,0,0.6)
      ),
      url('https://images.unsplash.com/photo-1498050108023-c5249f4df085');

    }

    .s2{
        text-align:center;
        padding:30px 3px;
        height:100px;
    }
    .s2>div{
        padding:10px;
        color:white;
        display:inline-block;
        border-radius:10px;
    }
    </style>
</head>
<body>
    <nav>
        <a href="">Home</a>
        <a href="">About</a>
        <a href="">Services</a>
        <a href="">Contact</a>
    </nav>

    <section class="s1">
        <h1>Learn CSS Through Projects</h1>
        <p>This project demonstrates CSS Colors, Backgrounds, Inline & Inline-Block, Box Model, and Fonts in one modern UI.</p>
    </section>

    <section class="s2">
        <h1>css colors</h1>
        <div style="background:red">Red</div>
        <div style="background:green">Green</div>
        <div style="background:blue">Blue</div>
        <div style="background:blueviolet">violet</div>
    </section>

</body>
</html>
