    tables

    table --to define a table
    tr --to define a row
    td- to define a table cell

     -->

            <th>group</th>
            <th>courses names</th>

        </tr>
        <tr>
            <td>6-10th</td>
            <td>maths,chemistry</td>
            <td>8000</td>
        </tr>
    </table>
    
</body>
