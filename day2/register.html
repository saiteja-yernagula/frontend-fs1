<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!-- 
    form tag - to define a structure for a registraion

    input-it defines the field 
    type-control the input
    for and id -to form relation

    name- it carries data in key value format
    value-pre defined value


    research topics
    list tags
    format tags
    iframe
    
    -->
    <form action="">
        <label for="name">enter ur name:</label>
        <input type="text" id="name" name="uname"> <br>

        <label for="">enter ur email:</label>
        <input type="email">
        <br>
        <label for="">enter ur dob:</label>
        <input type="date">
        <br>

         <h5>gender</h5>
         <input type="radio" id="r1" name="gender" value="male">
         <label for="r1">male</label>

         <input type="radio" id="r2" name="gender" value="female">
         <label for="r2">female</label>

         <h3>select ur subject</h3>
         <input type="checkbox" id="c1" name="subject" value="maths">
         <label for="c1">maths</label>

         <input type="checkbox" id="c2" name="subject" value="physics">
         <label for="c2">physics</label>

        <button type="submit">submit</button>
        <button type="reset">reset</button>
    </form>
    
</body>
