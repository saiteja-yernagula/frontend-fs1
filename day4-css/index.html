    css - cascading style sheet 
    css is a style sheet language used to describe the presentation of

    how to insert css
    1) inline - applied directly to the element using style attribute

    <h1 style='color:red;background:blue'> content</h1>

    2) internal css- styles applied to the html doc using style tags
    in head section 
<style>
    declaration
    selector{
     property:value
    }
    h1{
        color:red;
    }
</style>
<h1 style='background:blue '> content</h1 >


    3) external css - applied to the multiple files using link tag

    < link rel='stylesheet' href='demo.css'>

    demo.css
  h1{

    }
*/
